[workspace]
channels = ["conda-forge", "bioconda"]
channel-priority = "disabled"
name = "DBit-spatial-DARLIN"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]

[feature.dbit.dependencies]
python = "3.12.*"
star = "2.7.10b.*"
fuzzysearch = "0.8.1.*"
samtools = ">=1.6,<2"
pandas = "2.3.3.*"
matplotlib-base = "3.10.*"
umi_tools = "1.1.6.*"
seaborn = "0.13.2.*"
cutadapt = "5.2.*"
scanpy = "1.11.5.*"
python-igraph = ">=1.0.0,<2"
leidenalg = ">=0.11.0,<0.12"
fastp = ">=1.1.0,<2"
bio = ">=1.8.1,<2"
seqtk = ">=1.5,<2"

[feature.dbit.pypi-dependencies]
darlin-core = { git = "https://github.com/JarningGau/darlin-core", rev = "1.1.0" }

[feature.stardist.dependencies]
python = "3.10.*"

[feature.stardist.pypi-dependencies]
tensorflow-cpu = ">=2.21.0, <3"
stardist = ">=0.9.2, <0.10"
imagecodecs = ">=2025.3.30, <2026"
pandas = ">=2.3.3, <3"
opencv-python-headless = ">=4.13.0.92, <5"


[environments]
dbit = ["dbit"]
stardist = ["stardist"]
