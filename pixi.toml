[workspace]
channels = ["conda-forge", "bioconda"]
channel-priority = "disabled"
name = "DBit-spatial-DARLIN"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]

[feature.dbit.dependencies]
python = "3.12.*"
star = "2.7.10b.*"
fuzzysearch = "0.8.1.*"
samtools = ">=1.6,<2"
pandas = "2.3.3.*"
matplotlib-base = "3.10.*"
umi_tools = "1.1.6.*"
seaborn = "0.13.2.*"
cutadapt = "5.2.*"
scanpy = "1.11.5.*"
python-igraph = ">=1.0.0,<2"
leidenalg = ">=0.11.0,<0.12"
fastp = ">=1.1.0,<2"
bio = ">=1.8.1,<2"
seqtk = ">=1.5,<2"

[feature.image.dependencies]
python = "3.8.*"

[feature.image.pypi-dependencies]
stereopy = ">=1.6.2, <2"
opencv-python-headless = ">=4.13.0.90, <5"
ipython = ">=8.12.3, <9"
patchify = ">=0.2.3, <0.3"
fastremap = ">=1.15.1, <2"
roifile = ">=2023.5.12, <2024"
torch = { version = ">=2.4.1, <3", index = "https://download.pytorch.org/whl/cpu" }

[environments]
dbit = ["dbit"]
image = ["image"]