[workspace]
authors = ["wenxu yuan <yuanwenxu123@gmail.com>"]
channels = ["conda-forge", "bioconda"]
name = "DBiT-spatial-DARLIN"
platforms = ["linux-64"]
version = "0.2.0"

[tasks]
init = { cmd = "pixi install --all --locked && bash install-cli.sh", description = "Install all environments and the dbit command" }

[dependencies]

[feature.dbit.dependencies]
python = "3.12.*"
star = "2.7.10b.*"
fuzzysearch = "0.8.1.*"
samtools = ">=1.6,<2"
pandas = "2.3.3.*"
matplotlib-base = "3.10.*"
umi_tools = "1.1.6.*"
seaborn = "0.13.2.*"
cutadapt = "5.2.*"
scanpy = "1.11.5.*"
python-igraph = ">=1.0.0,<2"
leidenalg = ">=0.11.0,<0.12"
fastp = ">=1.1.0,<2"
bio = ">=1.8.1,<2"
seqtk = ">=1.5,<2"

[feature.dbit.pypi-dependencies]
darlin-core = { git = "https://github.com/JarningGau/darlin-core", rev = "1.1.0" }
pybanksy = ">=1.3.5, <2"

[feature.image.dependencies]
python = "3.10.*"
stardist = ">=0.9.2,<0.10"
tensorflow-cpu = ">=2.19.1,<3"
pandas = ">=2.3.3,<3"
opencv = ">=4.13.0,<5"

[feature.rctd.dependencies]
r = ">=4.3,<4.4"
r-spacexr = ">=2.2.1,<3"
r-hdf5r = ">=1.3.12,<2"

[environments]
default = ["dbit"]
image = ["image"]
rctd = ["rctd"]
